<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Egame - V1.0 - TS. Cao Thanh Hùng</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --ka-red: #ff3366; --ka-blue: #00f3ff; --ka-yellow: #ffde00; --ka-green: #00ff66; 
            --bg-dark: #0a0b10; --panel-bg: rgba(20, 22, 35, 0.85); --glass-border: rgba(0, 243, 255, 0.3);
            --text-glow: 0 0 10px rgba(0, 243, 255, 0.8);
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background: radial-gradient(circle at center, #1b1e32 0%, var(--bg-dark) 100%);
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        h1, h2, h3, .pin-number { font-family: 'Times New Roman', serif; text-transform: uppercase; }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 1; }
        .main-layout { display: flex; width: 95%; max-width: 1400px; gap: 25px; height: 85vh; }
        
        /* Glassmorphism Panels */
        .glass-panel {
            background: var(--panel-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(0, 243, 255, 0.05);
        }

        .game-area { flex: 3; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        .sidebar { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .screen { display: none; width: 100%; text-align: center; }
        .active { display: flex; flex-direction: column; align-items: center; animation: fadeIn 0.5s ease-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .giant-pin-card { padding: 40px; border-radius: 20px; width: 80%; max-width: 600px; text-align: center; }
        .pin-number { font-size: 6.5rem; font-weight: bold; color: var(--ka-blue); letter-spacing: 15px; margin: 20px 0; border: 2px dashed var(--ka-blue); padding: 15px; border-radius: 15px; background: rgba(0,0,0,0.5); }

        .grid-kahoot { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 25px; }
        
        /* 3D Buttons */
        .ka-btn { 
            padding: 25px 15px; border: none; border-radius: 12px; cursor: pointer; font-size: 1.5rem; font-family: Arial, sans-serif; font-weight: bold; color: white; min-height: 120px; transition: all 0.1s; position: relative; top: 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        .ka-btn:active:not(:disabled) { top: 6px; box-shadow: none !important; }
        .red { background: linear-gradient(145deg, #ff4d79, var(--ka-red)); box-shadow: 0 8px 0 #cc0033, 0 15px 20px rgba(255,51,102,0.4); } 
        .blue { background: linear-gradient(145deg, #33f5ff, var(--ka-blue)); box-shadow: 0 8px 0 #00b8cc, 0 15px 20px rgba(0,243,255,0.4); color: #000; text-shadow: none;} 
        .yellow { background: linear-gradient(145deg, #ffe633, var(--ka-yellow)); box-shadow: 0 8px 0 #cca300, 0 15px 20px rgba(255,222,0,0.4); color: #000; text-shadow: none;} 
        .green { background: linear-gradient(145deg, #33ff85, var(--ka-green)); box-shadow: 0 8px 0 #00cc44, 0 15px 20px rgba(0,255,102,0.4); color: #000; text-shadow: none;}
        
        /* Digital Timer */
        .timer-circle { 
            width: 90px; height: 90px; border: 4px solid var(--ka-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 15px; font-weight: bold; font-family: 'Times New Roman', serif; box-shadow: 0 0 15px var(--ka-blue), inset 0 0 15px var(--ka-blue); color: var(--ka-blue); text-shadow: var(--text-glow);
        }
        
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.3rem; }
        .trend-up { color: #00ff66; font-size: 1rem; margin-left: 5px; text-shadow: 0 0 5px #00ff66;} 
        .trend-down { color: #ff3366; font-size: 1rem; margin-left: 5px; text-shadow: 0 0 5px #ff3366;}
        
        .host-controls { margin-top: 25px; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; color: #fff; width: 90%; border: 1px solid var(--ka-green); }
        #my-stats { background: rgba(0, 255, 102, 0.2); color: var(--ka-green); padding: 12px 25px; border-radius: 10px; margin-top: 15px; font-size: 1.4rem; font-weight: bold; border: 1px solid var(--ka-green); text-shadow: 0 0 5px var(--ka-green); }

        /* Input 3D style */
        input[type="text"], input[type="file"] {
            background: rgba(0,0,0,0.5); border: 1px solid var(--ka-blue); color: #fff; border-radius: 8px; font-family: Arial, sans-serif; font-size: 1.2rem;
        }
        input[type="text"]:focus { outline: none; box-shadow: 0 0 10px var(--ka-blue); }
        
        .btn-3d {
            background: linear-gradient(145deg, #00f3ff, #0088cc); color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; font-family: 'Times New Roman', serif; box-shadow: 0 6px 0 #006699; transition: 0.1s;
        }
        .btn-3d:active { transform: translateY(6px); box-shadow: none; }

        /* Nút Audio Floating */
        .audio-btn {
            position: fixed; bottom: 25px; right: 25px; background: rgba(0,243,255,0.2); 
            border: 1px solid var(--ka-blue); color: white; border-radius: 50%; 
            width: 55px; height: 55px; font-size: 1.8rem; cursor: pointer; 
            z-index: 1000; box-shadow: 0 0 15px var(--ka-blue); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .audio-btn:hover { background: rgba(0,243,255,0.4); transform: scale(1.1); }

        /* Podium 3D Không gian có chiều sâu */
        .podium-stage {
            display: flex; justify-content: center; align-items: flex-end;
            gap: 20px; height: 350px; margin: 50px auto; width: 80%;
            perspective: 1000px; /* Tạo chiều sâu không gian 3D */
            position: relative;
        }
        
        /* Hiệu ứng sàn sân khấu */
        .podium-stage::before {
            content: ''; position: absolute; bottom: -30px; left: -10%; right: -10%; height: 100px;
            background: radial-gradient(ellipse at center, rgba(0,243,255,0.3) 0%, transparent 70%);
            transform: rotateX(70deg); z-index: 0;
        }

        .podium-step {
            display: flex; flex-direction: column; align-items: center; width: 150px;
            transform-style: preserve-3d;
            transform: rotateX(15deg); /* Nghiêng bục ra phía sau để thấy mặt trên */
            z-index: 1;
        }

        .podium-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px #fff; text-align: center; white-space: nowrap; transform: translateZ(20px); }
        .podium-score { font-size: 1.2rem; color: var(--ka-yellow); margin-bottom: 15px; transform: translateZ(20px); }
        
        /* Tạo hình khối 3D cho bục đứng */
        .step-block { 
            width: 100%; display: flex; align-items: center; justify-content: center; 
            font-size: 4rem; font-family: 'Times New Roman', serif; font-weight: bold; color: rgba(0,0,0,0.6); 
            position: relative;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,255,255,0.3);
        }
        
        /* Mặt trên của bục (Depth) */
        .step-block::before {
            content: ''; position: absolute; top: -30px; left: 0; width: 100%; height: 30px;
            background: inherit; filter: brightness(1.3);
            transform-origin: bottom; transform: rotateX(70deg);
            border-top: 1px solid rgba(255,255,255,0.8);
        }
        
        /* Mặt bên hông của bục (Depth) */
        .step-block::after {
            content: ''; position: absolute; top: 0; right: -20px; width: 20px; height: 100%;
            background: inherit; filter: brightness(0.7);
            transform-origin: left; transform: rotateY(70deg);
        }

        .step-1 { height: 200px; background: linear-gradient(180deg, #ffde00, #b39b00); }
        .step-2 { height: 140px; background: linear-gradient(180deg, #e0e0e0, #808080); }
        .step-3 { height: 90px; background: linear-gradient(180deg, #cd7f32, #8b5a2b); }

    </style>
</head>
<body>

<button class="audio-btn" id="audio-toggle-btn" onclick="toggleAudio()" title="Bật/Tắt Âm Thanh">🔊</button>

<div class="container">
    <div id="setup-screen" class="screen active">
        <div class="glass-panel" style="padding: 40px; width: 500px; position: relative;">
            <h1 style="color:var(--ka-blue); margin-top:0; text-shadow: var(--text-glow); font-size: 2.5rem;">EGAME - V1.0</h1>
            <p style="color: #aaa; margin-top: -15px;">DIGITAL TRANSFORMATION EDITION</p>
            
            <div id="host-part" style="text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                <p style="margin-top:0; color: var(--ka-green); font-size: 1.2rem;"><b><span style="font-family:'Times New Roman', serif;">[HOST]</span> GIẢNG VIÊN</b></p>
                <input type="text" id="class-name" placeholder="Tên lớp..." style="width:94%; padding:12px; margin-bottom:15px;">
                <input type="file" id="upload-excel" accept=".xlsx" style="width:94%; margin-bottom:20px; padding: 10px;">
                <button class="btn-3d" onclick="createRoom()" style="width:100%;">MỞ PHÒNG HỌC</button>
            </div>
            <hr style="margin: 25px 0; border-color: rgba(255,255,255,0.1);">
            <div id="player-part" style="text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);">
                <p style="margin-top:0; color: var(--ka-yellow); font-size: 1.2rem;"><b><span style="font-family:'Times New Roman', serif;">[PLAYER]</span> NGƯỜI CHƠI</b></p>
                <input type="text" id="input-pin" placeholder="Mã PIN..." style="width:94%; padding:12px; margin-bottom:15px;">
                <input type="text" id="user-name" placeholder="Họ và tên..." style="width:94%; padding:12px; margin-bottom:20px;">
                <button class="btn-3d" onclick="joinGame()" style="width:100%; background: linear-gradient(145deg, #33ff85, #00cc44); box-shadow: 0 6px 0 #009933;">VÀO THI</button>
            </div>
            
            <div style="margin-top: 25px; font-size: 1rem; color: #888; font-weight: bold; letter-spacing: 1px;">
                Thiết kế: Cao Thanh Hùng
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="glass-panel giant-pin-card">
            <h2 id="lobby-class-name" style="margin:0; color:var(--ka-blue);">LỚP ĐANG CHỜ...</h2>
            <div class="pin-number" id="display-pin">000000</div>
            <div id="player-count" style="font-size: 2rem; font-weight: bold; color: var(--ka-green); font-family: 'Times New Roman', serif; text-shadow: 0 0 10px var(--ka-green);">0 NGƯỜI CHƠI ONLINE</div>
            <br><br>
            <button id="start-btn" class="btn-3d" onclick="startGameNow()" style="padding:20px 60px; font-size:1.8rem; display:none;">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="main-layout" class="screen" style="width:100%;">
        <div class="main-layout">
            <div class="glass-panel game-area">
                <div class="timer-circle" id="timer">20</div>
                <h2 id="question-text" style="font-size: 2.2rem; text-align: center; text-shadow: 2px 2px 4px #000;">Đang tải câu hỏi...</h2>
                <div class="grid-kahoot" id="ans-buttons">
                    <button class="ka-btn red" id="btn-0" onclick="submitAns(0)">▲ <span id="txt-0"></span></button>
                    <button class="ka-btn blue" id="btn-1" onclick="submitAns(1)">◆ <span id="txt-1"></span></button>
                    <button class="ka-btn yellow" id="btn-2" onclick="submitAns(2)">● <span id="txt-2"></span></button>
                    <button class="ka-btn green" id="btn-3" onclick="submitAns(3)">■ <span id="txt-3"></span></button>
                </div>
                
                <div id="host-only-controls" class="host-controls" style="display:none;">
                    <div id="host-current-ans" style="background: rgba(0,243,255,0.2); border: 1px solid var(--ka-blue); padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none;">
                        <span style="color: var(--ka-blue); font-family: 'Times New Roman', serif; font-weight: bold;">ĐÁP ÁN ĐÚNG CỦA CÂU NÀY LÀ:</span> 
                        <span id="correct-ans-live" style="font-weight:bold; font-size:1.5rem; display:block; margin-top:5px; color: white;"></span>
                    </div>
                    
                    <p id="correct-ans-display" style="font-weight:bold; color:var(--ka-green); font-size:1.2rem; margin-bottom: 15px;"></p>
                    <button class="btn-3d" onclick="nextQuestion()" style="width: 100%; background: linear-gradient(145deg, #ffde00, #cca300); box-shadow: 0 6px 0 #997a00; color:#000;">PHÁT CÂU TIẾP THEO >></button>
                </div>
                
                <div id="my-stats" style="display:none;">NGƯỜI CHƠI: <span id="stat-name"></span> | ĐIỂM SỐ: <span id="stat-score">0</span></div>
                <div id="player-feedback" style="margin-top:20px; font-weight:bold; font-size:2.5rem; font-family: Arial, sans-serif; height: 50px;"></div>
            </div>
            
            <div class="glass-panel sidebar">
                <h3 style="margin:0; border-bottom: 2px solid var(--ka-blue); padding-bottom:15px; text-align:center; color: var(--ka-blue); text-shadow: var(--text-glow);">BẢNG XẾP HẠNG TRỰC TIẾP</h3>
                <div id="live-rank" style="flex:1; margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div id="final-result-screen" class="screen">
        <h1 style="font-size: 4rem; color: var(--ka-yellow); text-shadow: 0 0 20px var(--ka-yellow); margin-top: 0;">TỔNG KẾT BÀI THI</h1>
        
        <div id="podium-area" class="podium-stage" style="display:none;">
            <div class="podium-step">
                <div class="podium-name" id="top2-name">-</div>
                <div class="podium-score" id="top2-score">0</div>
                <div class="step-block step-2">2</div>
            </div>
            <div class="podium-step" style="z-index: 2;">
                <div class="podium-name" id="top1-name" style="color: var(--ka-yellow); font-size: 2rem;">-</div>
                <div class="podium-score" id="top1-score" style="font-size: 1.5rem;">0</div>
                <div class="step-block step-1">1</div>
            </div>
            <div class="podium-step">
                <div class="podium-name" id="top3-name">-</div>
                <div class="podium-score" id="top3-score">0</div>
                <div class="step-block step-3">3</div>
            </div>
        </div>

        <div id="final-leaderboard" class="glass-panel" style="width: 90%; max-width: 600px; padding: 20px; margin: 0 auto; text-align: left;"></div>
        <br>
        <button class="btn-3d" onclick="exportExcel()" style="background: linear-gradient(145deg, #00f3ff, #0088cc); margin: 10px;">XUẤT FILE KẾT QUẢ</button>
        <button class="btn-3d" onclick="location.reload()" style="background: linear-gradient(145deg, #ff4d79, #cc0033); box-shadow: 0 6px 0 #990026; margin: 10px; color: white;">KHỞI ĐỘNG LẠI</button>
    </div>
</div>

<script>
    const SB_URL = "https://iatarpzwbpmvxafkuhvh.supabase.co"; 
    const SB_KEY = "sb_publishable_L8zkZyosiIUfXbznifDV5g_Stvlxt_O"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    // --- HỆ THỐNG ÂM THANH (Đã cập nhật nhạc sôi động và báo hết giờ) ---
    // Nhạc nền Game Show sôi động (Lặp lại)
    const audioBGM = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
    audioBGM.loop = true; audioBGM.volume = 0.5;
    
    // Âm thanh kết thúc câu hỏi (Tiếng chuông báo / Buzzer)
    const audioTimeUp = new Audio('https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg');
    
    // Nhạc chiến thắng khi tổng kết
    const audioVictory = new Audio('https://actions.google.com/sounds/v1/crowds/crowd_cheering.ogg');
    
    // Logic bật/tắt âm thanh
    let isMuted = false;
    function toggleAudio() {
        isMuted = !isMuted;
        document.getElementById('audio-toggle-btn').innerText = isMuted ? '🔇' : '🔊';
        
        audioBGM.muted = isMuted;
        audioTimeUp.muted = isMuted;
        audioVictory.muted = isMuted;
    }
    // -----------------------------------

    let isHost = false, myName = "", roomPin = "", quizData = [], channel;
    let currentIdx = -1, correctIdx = -1, timerVal = 20, timerInt, totalScore = 0, correctCount = 0, hasAnswered = false;
    
    let liveScores = {}; 
    let liveCorrects = {}; 
    let oldRankings = {};

    document.getElementById('upload-excel').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]], {header:1});
            quizData = data.slice(1).map(r => {
                let ansStr = String(r[5]).trim().toUpperCase();
                let parsedC = 0;
                if(ansStr === 'A') parsedC = 0; else if(ansStr === 'B') parsedC = 1; else if(ansStr === 'C') parsedC = 2; else if(ansStr === 'D') parsedC = 3;
                else parsedC = parseInt(ansStr) || 0;
                return { q: r[0], a: [r[1], r[2], r[3], r[4]], c: parsedC };
            });
            alert(`✅ Đã đồng bộ ${quizData.length} câu hỏi thành công!`);
        };
        reader.readAsBinaryString(e.target.files[0]);
    };

    async function createRoom() {
        const cName = document.getElementById('class-name').value;
        if(!cName || quizData.length === 0) return alert("Vui lòng nhập tên lớp và nạp file Excel!");
        roomPin = Math.floor(100000 + Math.random() * 900000).toString();
        isHost = true;
        document.getElementById('display-pin').innerText = roomPin;
        document.getElementById('lobby-class-name').innerText = "MÃ TRUY CẬP: " + cName;
        document.getElementById('start-btn').style.display = 'inline-block';
        showScreen('lobby-screen');
        initChannel(roomPin);
    }

    async function joinGame() {
        roomPin = document.getElementById('input-pin').value;
        myName = document.getElementById('user-name').value;
        if(!roomPin || !myName) return alert("Nhập đủ PIN và Tên người chơi!");
        
        liveScores[myName] = 0; 
        liveCorrects[myName] = 0;
        document.getElementById('my-stats').style.display = 'block';
        document.getElementById('stat-name').innerText = myName;
        
        showScreen('lobby-screen');
        document.getElementById('display-pin').innerText = roomPin;
        document.getElementById('lobby-class-name').innerText = "ĐANG CHỜ GIẢNG VIÊN MỞ BÀI THI...";
        initChannel(roomPin);
    }

    function initChannel(pin) {
        channel = supabaseClient.channel('room_' + pin, { config: { presence: { key: myName || 'Host' } } });
        channel
        .on('presence', { event: 'sync' }, () => {
            const count = Object.keys(channel.presenceState()).length - (isHost ? 1 : 0);
            document.getElementById('player-count').innerText = `${count} NGƯỜI CHƠI ONLINE`;
        })
        .on('broadcast', { event: 'game_start' }, () => showScreen('main-layout'))
        .on('broadcast', { event: 'game_update' }, (p) => updateGameUI(p.payload))
        .on('broadcast', { event: 'score_update' }, (p) => {
            liveScores[p.payload.name] = p.payload.score;
            liveCorrects[p.payload.name] = p.payload.correct; 
            renderLeaderboard();
        })
        .on('broadcast', { event: 'game_finish' }, () => showFinalResult())
        .subscribe(async (s) => {
            if (s === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() });
        });
    }

    function startGameNow() {
        channel.send({ type: 'broadcast', event: 'game_start' });
        showScreen('main-layout');
        document.getElementById('host-only-controls').style.display = 'block';
        
        // Mở nhạc nền khi bắt đầu
        audioBGM.play().catch(e => console.log("Trình duyệt chặn Autoplay"));
        
        nextQuestion();
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx >= quizData.length) {
            channel.send({ type: 'broadcast', event: 'game_finish' });
            showFinalResult();
            return;
        }
        const data = { q: quizData[currentIdx].q, a: quizData[currentIdx].a, c: quizData[currentIdx].c, idx: currentIdx };
        channel.send({ type: 'broadcast', event: 'game_update', payload: data });
        updateGameUI(data);
    }

    function updateGameUI(data) {
        showScreen('main-layout');
        hasAnswered = false;
        correctIdx = parseInt(data.c); 
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('player-feedback').innerHTML = "";
        
        const labels = ['▲ (A)','◆ (B)','● (C)','■ (D)'];
        for(let i=0; i<4; i++) {
            document.getElementById('txt-' + i).innerText = data.a[i];
            document.getElementById('btn-' + i).disabled = false;
            document.getElementById('btn-' + i).style.opacity = "1";
            document.getElementById('btn-' + i).style.transform = "scale(1)";
        }
        
        // Host Setup: Chuẩn bị text đáp án nhưng ẨN ĐI (display: none)
        if(isHost) {
            document.getElementById('host-current-ans').style.display = 'none'; // Ẩn lúc đang làm bài
            document.getElementById('correct-ans-live').innerText = labels[data.c] + " - " + data.a[data.c];
            
            if(currentIdx > 0) {
                document.getElementById('correct-ans-display').innerText = "[Lịch sử] Đáp án đúng câu trước: " + labels[quizData[currentIdx-1].c];
            }
        }

        audioTimeUp.pause(); audioTimeUp.currentTime = 0;
        if(isHost || myName !== "") audioBGM.play().catch(e=>{});

        timerVal = 20;
        document.getElementById('timer').innerText = timerVal;
        document.getElementById('timer').style.color = 'var(--ka-blue)';
        
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            timerVal--;
            document.getElementById('timer').innerText = timerVal;
            
            if(timerVal <= 5) {
                document.getElementById('timer').style.color = 'var(--ka-red)'; 
            }

            if(timerVal <= 0) {
                clearInterval(timerInt);
                document.querySelectorAll('.ka-btn').forEach(b => b.disabled = true);
                
                // Hết giờ: Hiển thị đáp án cho Host
                if(isHost) {
                    document.getElementById('host-current-ans').style.display = 'block';
                }

                // Hết giờ: Tắt nhạc nền, bật nhạc kết thúc câu hỏi
                audioBGM.pause(); 
                if(isHost || myName !== "") audioTimeUp.play().catch(e=>{});
            }
        }, 1000);
    }

    async function submitAns(idx) {
        if(isHost || hasAnswered) return;
        hasAnswered = true;
        document.querySelectorAll('.ka-btn').forEach(b => { 
            if(b.id !== 'btn-'+idx) {
                b.style.opacity = "0.3"; 
                b.style.transform = "scale(0.95)";
            }
            b.disabled = true; 
        });
        
        const fb = document.getElementById('player-feedback');
        
        // Yêu cầu: Đúng ghi "ĐÚNG" chữ đỏ, Sai ghi "SAI" chữ đen trên nền trắng để dễ nhìn
        if(idx == correctIdx) {
            const points = 500 + (timerVal * 25);
            totalScore += points;
            correctCount++; 
            fb.innerHTML = `<span style="color: red; background: white; padding: 5px 25px; border-radius: 8px; border: 2px solid red;">ĐÚNG</span>`;
            document.getElementById('stat-score').innerText = totalScore;
            
            liveScores[myName] = totalScore;
            liveCorrects[myName] = correctCount;
            renderLeaderboard();
            channel.send({ type: 'broadcast', event: 'score_update', payload: { name: myName, score: totalScore, correct: correctCount } });
            
            supabaseClient.from('leaderboard').upsert({ student_name: myName, score: totalScore }, { onConflict: 'student_name' }).then();
        } else { 
            fb.innerHTML = `<span style="color: black; background: white; padding: 5px 25px; border-radius: 8px; border: 2px solid black;">SAI</span>`; 
        }
    }

    function renderLeaderboard(isFinal = false) {
        let arr = Object.keys(liveScores).map(k => ({ 
            student_name: k, 
            score: liveScores[k],
            correct: liveCorrects[k] || 0 
        }));
        arr.sort((a, b) => b.score - a.score);

        let html = "";
        arr.forEach((p, i) => {
            const currentRank = i + 1;
            const prevRank = oldRankings[p.student_name];
            let trend = "";
            
            if(prevRank) {
                if(currentRank < prevRank) trend = `<span class="trend-up">▲${prevRank - currentRank}</span>`;
                else if(currentRank > prevRank) trend = `<span class="trend-down">▼${currentRank - prevRank}</span>`;
            }
            oldRankings[p.student_name] = currentRank;

            if(i < 15 || isFinal) { 
                let colorInfo = (currentRank===1)?'var(--ka-yellow)':(currentRank===2)?'#c0c0c0':(currentRank===3)?'#cd7f32':'#fff';
                
                html += `<div class="rank-item" style="color: ${colorInfo}; font-weight: ${currentRank<=3?'bold':'normal'};">
                            <span><b>#${currentRank}</b> ${p.student_name} ${trend}</span>
                            <span style="font-family:'Times New Roman', serif;">${p.score}</span>
                         </div>`;
            }
        });
        
        document.getElementById('live-rank').innerHTML = html;
        if(isFinal) document.getElementById('final-leaderboard').innerHTML = html;
        window.fullDataForExport = arr;
    }

    function triggerFireworks() {
        var duration = 5 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 9999 };

        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
            confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
        }, 250);
    }

    function showFinalResult() {
        showScreen('final-result-screen');
        renderLeaderboard(true); 
        
        // Dừng nhạc cũ, bật nhạc trao giải
        audioBGM.pause(); audioTimeUp.pause();
        audioVictory.play().catch(e=>{});

        triggerFireworks();

        const arr = window.fullDataForExport;
        if(arr && arr.length > 0) {
            document.getElementById('podium-area').style.display = 'flex';
            
            // Hạng 1
            document.getElementById('top1-name').innerText = arr[0].student_name;
            document.getElementById('top1-score').innerText = arr[0].score + " pts";
            
            // Hạng 2
            if(arr.length > 1) {
                document.getElementById('top2-name').innerText = arr[1].student_name;
                document.getElementById('top2-score').innerText = arr[1].score + " pts";
            }
            
            // Hạng 3
            if(arr.length > 2) {
                document.getElementById('top3-name').innerText = arr[2].student_name;
                document.getElementById('top3-score').innerText = arr[2].score + " pts";
            }
        }
    }

    function exportExcel() {
        if(!window.fullDataForExport || window.fullDataForExport.length === 0) return alert("Hệ thống chưa có dữ liệu Người chơi!");
        
        const className = document.getElementById('class-name').value || 'Không rõ lớp';
        const now = new Date();
        const dateStr = now.toLocaleDateString('vi-VN') + ' ' + now.toLocaleTimeString('vi-VN'); 

        const excelData = window.fullDataForExport.map((p, index) => ({
            "STT": index + 1,
            "Ngày tháng năm": dateStr,
            "Họ tên": p.student_name,
            "Lớp": className,
            "Điểm số": p.score,
            "Số câu đúng": p.correct
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        ws['!cols'] = [ {wch: 5}, {wch: 20}, {wch: 25}, {wch: 15}, {wch: 10}, {wch: 15} ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DiemTongKet");
        XLSX.writeFile(wb, `BaoCao_KetQua_${className.replace(/\s+/g, '_')}.xlsx`);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
