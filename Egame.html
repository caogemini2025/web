<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Egame Pro v3 - TS. Cao Thanh Hùng</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --ka-red: #e21b3c; --ka-blue: #1368ce; --ka-yellow: #d89e00; --ka-green: #26890c; --bg: #46178f; }
        body { font-family: 'Segoe UI', Arial; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .main-layout { display: flex; width: 95%; max-width: 1200px; gap: 20px; height: 80vh; }
        
        /* Cột trái: Nội dung chính */
        .game-area { flex: 3; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Cột phải: Bảng điểm cố định */
        .sidebar { flex: 1; background: white; color: #333; border-radius: 15px; padding: 15px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .screen { display: none; width: 100%; text-align: center; }
        .active { display: flex; flex-direction: column; align-items: center; }
        
        .grid-kahoot { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        .ka-btn { padding: 25px 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; color: white; font-weight: bold; min-height: 100px; }
        .red { background: var(--ka-red); } .blue { background: var(--ka-blue); } .yellow { background: var(--ka-yellow); } .green { background: var(--ka-green); }
        
        .timer-circle { width: 60px; height: 60px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .host-controls { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; color: #333; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="setup-screen" class="screen active">
        <div style="background: white; color: #333; padding: 30px; border-radius: 15px; width: 400px;">
            <h1 style="color:var(--bg)">Egame v3</h1>
            <div id="host-part">
                <p><b>Giảng viên:</b></p>
                <input type="text" id="class-name" placeholder="Tên lớp..." style="width:90%; padding:10px; margin-bottom:10px;">
                <input type="file" id="upload-excel" accept=".xlsx" style="font-size: 0.8rem;">
                <button onclick="createRoom()" style="background:var(--bg); color:white; width:100%; padding:12px; margin-top:10px; border:none; border-radius:5px; cursor:pointer;">MỞ PHÒNG HỌC</button>
            </div>
            <hr style="margin: 20px 0;">
            <div id="player-part">
                <p><b>Sinh viên:</b></p>
                <input type="text" id="input-pin" placeholder="Mã PIN..." style="width:90%; padding:10px; margin-bottom:10px;">
                <input type="text" id="user-name" placeholder="Tên SV..." style="width:90%; padding:10px; margin-bottom:10px;">
                <button onclick="joinGame()" style="background:#26890c; color:white; width:100%; padding:12px; border:none; border-radius:5px; cursor:pointer;">THAM GIA</button>
            </div>
        </div>
    </div>

    <div id="main-layout" class="screen" style="width:100%;">
        <div class="main-layout">
            <div class="game-area">
                <div class="timer-circle" id="timer">20</div>
                <h2 id="question-text">Đang chờ câu hỏi...</h2>
                <div class="grid-kahoot" id="ans-buttons">
                    <button class="ka-btn red" id="btn-0" onclick="submitAns(0)">▲ <span id="txt-0"></span></button>
                    <button class="ka-btn blue" id="btn-1" onclick="submitAns(1)">◆ <span id="txt-1"></span></button>
                    <button class="ka-btn yellow" id="btn-2" onclick="submitAns(2)">● <span id="txt-2"></span></button>
                    <button class="ka-btn green" id="btn-3" onclick="submitAns(3)">■ <span id="txt-3"></span></button>
                </div>
                
                <div id="host-only-controls" class="host-controls" style="display:none;">
                    <p id="correct-ans-display">Đáp án đúng: ...</p>
                    <button onclick="nextQuestion()" style="background:#27ae60; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">CÂU TIẾP THEO >>></button>
                </div>
                <div id="player-feedback" style="margin-top:15px; font-weight:bold; font-size:1.2rem;"></div>
            </div>

            <div class="sidebar">
                <h3 style="margin-top:0; border-bottom: 2px solid var(--bg); padding-bottom:10px;">BẢNG ĐIỂM LỚP</h3>
                <div id="live-rank"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://iatarpzwbpmvxafkuhvh.supabase.co"; 
    const SB_KEY = "sb_publishable_L8zkZyosiIUfXbznifDV5g_Stvlxt_O"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let isHost = false, myName = "", roomPin = "", quizData = [], channel;
    let currentIdx = -1, correctIdx = -1, timerVal = 20, timerInt, totalScore = 0, hasAnswered = false;

    // ĐỌC EXCEL
    document.getElementById('upload-excel').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]], {header:1});
            quizData = data.slice(1).map(r => ({ q: r[0], a: [r[1], r[2], r[3], r[4]], c: r[5] }));
        };
        reader.readAsBinaryString(e.target.files[0]);
    };

    // TẠO PHÒNG (GIẢNG VIÊN)
    async function createRoom() {
        const cName = document.getElementById('class-name').value;
        if(!cName || quizData.length === 0) return alert("Thiếu tên lớp hoặc file Excel!");
        roomPin = Math.floor(100000 + Math.random() * 900000).toString();
        isHost = true;
        document.getElementById('host-only-controls').style.display = 'block';
        alert("Mã PIN của anh là: " + roomPin);
        initGame(roomPin);
    }

    // THAM GIA (SINH VIÊN)
    async function joinGame() {
        roomPin = document.getElementById('input-pin').value;
        myName = document.getElementById('user-name').value;
        if(!roomPin || !myName) return alert("Nhập đủ PIN và Tên!");
        initGame(roomPin);
    }

    function initGame(pin) {
        showScreen('main-layout');
        channel = supabaseClient.channel('room_' + pin);
        channel
        .on('broadcast', { event: 'game_update' }, (payload) => {
            updateGameUI(payload.payload);
        })
        .subscribe(() => {
            if(isHost) nextQuestion(); // Câu đầu tiên
            loadLeaderboard();
        });
        
        // Theo dõi bảng điểm liên tục
        setInterval(loadLeaderboard, 3000);
    }

    // ĐIỀU KHIỂN CHUYỂN CÂU (CHỈ GIẢNG VIÊN)
    function nextQuestion() {
        currentIdx++;
        if(currentIdx >= quizData.length) {
            alert("Đã hết bộ câu hỏi!");
            return;
        }
        const data = {
            q: quizData[currentIdx].q,
            a: quizData[currentIdx].a,
            c: quizData[currentIdx].c,
            idx: currentIdx
        };
        channel.send({ type: 'broadcast', event: 'game_update', payload: data });
        updateGameUI(data);
    }

    // CẬP NHẬT GIAO DIỆN KHI NHẬN LỆNH TỪ HOST
    function updateGameUI(data) {
        hasAnswered = false;
        correctIdx = data.c;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('player-feedback').innerText = "";
        
        // Hiện đáp án vào nút
        for(let i=0; i<4; i++) {
            document.getElementById('txt-' + i).innerText = data.a[i];
            document.getElementById('btn-' + i).disabled = false;
        }

        if(isHost) {
            const labels = ['A','B','C','D'];
            document.getElementById('correct-ans-display').innerText = "Đáp án đúng: " + labels[data.c];
        }

        // Chạy đồng hồ
        timerVal = 20;
        document.getElementById('timer').innerText = timerVal;
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            timerVal--;
            document.getElementById('timer').innerText = timerVal;
            if(timerVal <= 0) {
                clearInterval(timerInt);
                document.querySelectorAll('.ka-btn').forEach(b => b.disabled = true);
            }
        }, 1000);
    }

    // SINH VIÊN TRẢ LỜI
    async function submitAns(idx) {
        if(isHost || hasAnswered) return;
        hasAnswered = true;
        document.querySelectorAll('.ka-btn').forEach(b => b.disabled = true);
        
        const fb = document.getElementById('player-feedback');
        if(idx == correctIdx) {
            const points = 500 + (timerVal * 25);
            totalScore += points;
            fb.innerHTML = `<span style="color:#2ecc71">CHÍNH XÁC! +${points}đ</span>`;
            await supabaseClient.from('leaderboard').upsert({ student_name: myName, score: totalScore }, { onConflict: 'student_name' });
        } else {
            fb.innerHTML = `<span style="color:#e21b3c">SAI RỒI!</span>`;
        }
        loadLeaderboard();
    }

    // TẢI BẢNG ĐIỂM (HIỂN THỊ Ở CỘT CỐ ĐỊNH)
    async function loadLeaderboard() {
        const { data } = await supabaseClient.from('leaderboard').select('*').order('score', { ascending: false }).limit(15);
        if(data) {
            document.getElementById('live-rank').innerHTML = data.map((p, i) => `
                <div class="rank-item">
                    <span>${i+1}. ${p.student_name}</span>
                    <span style="font-weight:bold; color:var(--ka-blue)">${p.score}</span>
                </div>
            `).join('');
        }
    }

    function showScreen(id) {
        document.getElementById('setup-screen').classList.remove('active');
        document.getElementById('main-layout').classList.add('active');
    }
</script>
</body>
</html>
