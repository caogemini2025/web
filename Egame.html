<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Egame Pro v5.1 - TS. Cao Thanh Hùng</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --ka-red: #e21b3c; --ka-blue: #1368ce; --ka-yellow: #d89e00; --ka-green: #26890c; --bg: #46178f; }
        body { font-family: 'Segoe UI', Arial; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .main-layout { display: flex; width: 95%; max-width: 1300px; gap: 20px; height: 85vh; }
        
        .game-area { flex: 3; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;}
        .sidebar { flex: 1; background: white; color: #333; border-radius: 15px; padding: 15px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        
        .screen { display: none; width: 100%; text-align: center; }
        .active { display: flex; flex-direction: column; align-items: center; }
        
        .giant-pin-card { background: white; color: #333; padding: 40px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.5); width: 80%; max-width: 600px; }
        .pin-number { font-size: 6rem; font-weight: 900; color: var(--bg); letter-spacing: 15px; margin: 20px 0; border: 4px dashed var(--bg); padding: 10px; border-radius: 10px; }

        .grid-kahoot { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 20px; }
        .ka-btn { padding: 25px 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; color: white; font-weight: bold; min-height: 100px; transition: 0.2s; }
        .red { background: var(--ka-red); } .blue { background: var(--ka-blue); } .yellow { background: var(--ka-yellow); } .green { background: var(--ka-green); }
        
        .timer-circle { width: 70px; height: 70px; border: 4px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 10px; font-weight: bold; }
        
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; font-size: 1.1rem; }
        .trend-up { color: #2ecc71; font-size: 0.8rem; margin-left: 5px;} 
        .trend-down { color: #e74c3c; font-size: 0.8rem; margin-left: 5px;}
        
        .host-controls { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; color: #333; width: 90%; }
        #my-stats { background: #2ecc71; color: white; padding: 10px 20px; border-radius: 8px; margin-top: 10px; font-size: 1.2rem; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen" class="screen active">
        <div style="background: white; color: #333; padding: 30px; border-radius: 15px; width: 450px;">
            <h1 style="color:var(--bg); margin-top:0;">Egame Pro v5</h1>
            <div id="host-part" style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
                <p style="margin-top:0;"><b>🔑 Giảng viên:</b></p>
                <input type="text" id="class-name" placeholder="Tên lớp..." style="width:94%; padding:10px; margin-bottom:10px;">
                <input type="file" id="upload-excel" accept=".xlsx" style="width:94%; margin-bottom:10px;">
                <button onclick="createRoom()" style="background:var(--bg); color:white; width:100%; padding:12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">MỞ PHÒNG HỌC</button>
            </div>
            <hr style="margin: 20px 0;">
            <div id="player-part" style="text-align: left;">
                <p style="margin-top:0;"><b>📝 Sinh viên:</b></p>
                <input type="text" id="input-pin" placeholder="Mã PIN..." style="width:94%; padding:10px; margin-bottom:10px;">
                <input type="text" id="user-name" placeholder="Họ và tên..." style="width:94%; padding:10px; margin-bottom:10px;">
                <button onclick="joinGame()" style="background:#26890c; color:white; width:100%; padding:12px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">VÀO THI</button>
            </div>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <div class="giant-pin-card">
            <h2 id="lobby-class-name" style="margin:0; color:#666;">LỚP ĐANG CHỜ...</h2>
            <div class="pin-number" id="display-pin">000000</div>
            <div id="player-count" style="font-size: 1.5rem; font-weight: bold; color: var(--ka-green);">0 SV online</div>
            <br>
            <button id="start-btn" onclick="startGameNow()" style="background:var(--bg); color:white; padding:15px 50px; border:none; border-radius:10px; font-size:1.5rem; font-weight:bold; cursor:pointer; display:none;">BẮT ĐẦU</button>
        </div>
    </div>

    <div id="main-layout" class="screen" style="width:100%;">
        <div class="main-layout">
            <div class="game-area">
                <div class="timer-circle" id="timer">20</div>
                <h2 id="question-text" style="font-size: 1.8rem;">Đang chờ câu hỏi...</h2>
                <div class="grid-kahoot" id="ans-buttons">
                    <button class="ka-btn red" id="btn-0" onclick="submitAns(0)">▲ <span id="txt-0"></span></button>
                    <button class="ka-btn blue" id="btn-1" onclick="submitAns(1)">◆ <span id="txt-1"></span></button>
                    <button class="ka-btn yellow" id="btn-2" onclick="submitAns(2)">● <span id="txt-2"></span></button>
                    <button class="ka-btn green" id="btn-3" onclick="submitAns(3)">■ <span id="txt-3"></span></button>
                </div>
                
                <div id="host-only-controls" class="host-controls" style="display:none;">
                    <p id="correct-ans-display" style="font-weight:bold; color:var(--ka-green); font-size:1.2rem;">Đáp án đúng câu trước: ...</p>
                    <button onclick="nextQuestion()" style="background:#27ae60; color:white; border:none; padding:12px 25px; border-radius:5px; cursor:pointer; font-weight:bold;">CÂU TIẾP THEO >></button>
                </div>
                
                <div id="my-stats" style="display:none;">Thí sinh: <span id="stat-name"></span> | Điểm: <span id="stat-score">0</span></div>
                <div id="player-feedback" style="margin-top:10px; font-weight:bold; font-size:1.5rem;"></div>
            </div>
            
            <div class="sidebar">
                <h3 style="margin:0; border-bottom: 3px solid var(--bg); padding-bottom:10px; text-align:center;">BẢNG XẾP HẠNG</h3>
                <div id="live-rank" style="flex:1;"></div>
            </div>
        </div>
    </div>

    <div id="final-result-screen" class="screen">
        <h1 style="font-size: 3rem;">KẾT THÚC BÀI THI</h1>
        <div id="final-leaderboard" style="background:white; color:#333; width: 90%; max-width: 600px; border-radius: 15px; padding: 20px; margin: 0 auto; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
        <br>
        <button onclick="exportExcel()" style="background:#3498db; color:white; padding:15px 40px; border:none; border-radius:10px; font-weight:bold; font-size:1.2rem; cursor:pointer; margin: 10px;">XUẤT FILE EXCEL ĐIỂM</button>
        <button onclick="location.reload()" style="background:white; color:var(--bg); padding:15px 40px; border:none; border-radius:10px; font-weight:bold; font-size:1.2rem; cursor:pointer; margin: 10px;">QUAY LẠI TỪ ĐẦU</button>
    </div>
</div>

<script>
    const SB_URL = "https://iatarpzwbpmvxafkuhvh.supabase.co"; 
    const SB_KEY = "sb_publishable_L8zkZyosiIUfXbznifDV5g_Stvlxt_O"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let isHost = false, myName = "", roomPin = "", quizData = [], channel;
    let currentIdx = -1, correctIdx = -1, timerVal = 20, timerInt, totalScore = 0, correctCount = 0, hasAnswered = false;
    
    // Lưu trữ điểm nội bộ cực nhanh
    let liveScores = {}; 
    let liveCorrects = {}; // Thêm biến lưu số câu đúng
    let oldRankings = {};

    document.getElementById('upload-excel').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const data = XLSX.utils.sheet_to_json(XLSX.read(evt.target.result, {type:'binary'}).Sheets[XLSX.read(evt.target.result, {type:'binary'}).SheetNames[0]], {header:1});
            quizData = data.slice(1).map(r => {
                let ansStr = String(r[5]).trim().toUpperCase();
                let parsedC = 0;
                if(ansStr === 'A') parsedC = 0; else if(ansStr === 'B') parsedC = 1; else if(ansStr === 'C') parsedC = 2; else if(ansStr === 'D') parsedC = 3;
                else parsedC = parseInt(ansStr) || 0;
                return { q: r[0], a: [r[1], r[2], r[3], r[4]], c: parsedC };
            });
            alert(`Đã nạp ${quizData.length} câu hỏi thành công!`);
        };
        reader.readAsBinaryString(e.target.files[0]);
    };

    async function createRoom() {
        const cName = document.getElementById('class-name').value;
        if(!cName || quizData.length === 0) return alert("Vui lòng nhập tên lớp và nạp file Excel!");
        roomPin = Math.floor(100000 + Math.random() * 900000).toString();
        isHost = true;
        document.getElementById('display-pin').innerText = roomPin;
        document.getElementById('lobby-class-name').innerText = "LỚP: " + cName;
        document.getElementById('start-btn').style.display = 'inline-block';
        showScreen('lobby-screen');
        initChannel(roomPin);
    }

    async function joinGame() {
        roomPin = document.getElementById('input-pin').value;
        myName = document.getElementById('user-name').value;
        if(!roomPin || !myName) return alert("Nhập đủ PIN và Tên!");
        
        liveScores[myName] = 0; 
        liveCorrects[myName] = 0;
        document.getElementById('my-stats').style.display = 'block';
        document.getElementById('stat-name').innerText = myName;
        
        showScreen('lobby-screen');
        document.getElementById('display-pin').innerText = roomPin;
        document.getElementById('lobby-class-name').innerText = "ĐÃ VÀO PHÒNG - CHỜ GIẢNG VIÊN";
        initChannel(roomPin);
    }

    function initChannel(pin) {
        channel = supabaseClient.channel('room_' + pin, { config: { presence: { key: myName || 'Host' } } });
        channel
        .on('presence', { event: 'sync' }, () => {
            const count = Object.keys(channel.presenceState()).length - (isHost ? 1 : 0);
            document.getElementById('player-count').innerText = `${count} SV online`;
        })
        .on('broadcast', { event: 'game_start' }, () => showScreen('main-layout'))
        .on('broadcast', { event: 'game_update' }, (p) => updateGameUI(p.payload))
        .on('broadcast', { event: 'score_update' }, (p) => {
            liveScores[p.payload.name] = p.payload.score;
            liveCorrects[p.payload.name] = p.payload.correct; // Nhận số câu đúng từ sóng
            renderLeaderboard();
        })
        .on('broadcast', { event: 'game_finish' }, () => showFinalResult())
        .subscribe(async (s) => {
            if (s === 'SUBSCRIBED') await channel.track({ online_at: new Date().toISOString() });
        });
    }

    function startGameNow() {
        channel.send({ type: 'broadcast', event: 'game_start' });
        showScreen('main-layout');
        document.getElementById('host-only-controls').style.display = 'block';
        nextQuestion();
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx >= quizData.length) {
            channel.send({ type: 'broadcast', event: 'game_finish' });
            showFinalResult();
            return;
        }
        const data = { q: quizData[currentIdx].q, a: quizData[currentIdx].a, c: quizData[currentIdx].c, idx: currentIdx };
        channel.send({ type: 'broadcast', event: 'game_update', payload: data });
        updateGameUI(data);
    }

    function updateGameUI(data) {
        showScreen('main-layout');
        hasAnswered = false;
        correctIdx = parseInt(data.c); 
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('player-feedback').innerText = "";
        
        for(let i=0; i<4; i++) {
            document.getElementById('txt-' + i).innerText = data.a[i];
            document.getElementById('btn-' + i).disabled = false;
            document.getElementById('btn-' + i).style.opacity = "1";
        }
        
        if(isHost && currentIdx > 0) {
            const labels = ['A','B','C','D'];
            document.getElementById('correct-ans-display').innerText = "Đáp án đúng câu trước: " + labels[quizData[currentIdx-1].c];
        }

        timerVal = 20;
        document.getElementById('timer').innerText = timerVal;
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            timerVal--;
            document.getElementById('timer').innerText = timerVal;
            if(timerVal <= 0) {
                clearInterval(timerInt);
                document.querySelectorAll('.ka-btn').forEach(b => b.disabled = true);
            }
        }, 1000);
    }

    async function submitAns(idx) {
        if(isHost || hasAnswered) return;
        hasAnswered = true;
        document.querySelectorAll('.ka-btn').forEach(b => { if(b.id !== 'btn-'+idx) b.style.opacity = "0.3"; b.disabled = true; });
        
        const fb = document.getElementById('player-feedback');
        if(idx == correctIdx) {
            const points = 500 + (timerVal * 25);
            totalScore += points;
            correctCount++; // Tăng biến đếm câu đúng
            fb.innerHTML = `<span style="color:#2ecc71">ĐÚNG RỒI! +${points}đ</span>`;
            document.getElementById('stat-score').innerText = totalScore;
            
            liveScores[myName] = totalScore;
            liveCorrects[myName] = correctCount;
            renderLeaderboard();
            channel.send({ type: 'broadcast', event: 'score_update', payload: { name: myName, score: totalScore, correct: correctCount } });
            
            // Có thể giữ lệnh lưu ngầm này nếu DB của anh đã sẵn sàng, nếu không nó cũng không gây ảnh hưởng tới quá trình chơi
            supabaseClient.from('leaderboard').upsert({ student_name: myName, score: totalScore }, { onConflict: 'student_name' }).then();
        } else { 
            fb.innerHTML = `<span style="color:#e21b3c">SAI RỒI!</span>`; 
        }
    }

    function renderLeaderboard(isFinal = false) {
        let arr = Object.keys(liveScores).map(k => ({ 
            student_name: k, 
            score: liveScores[k],
            correct: liveCorrects[k] || 0 // Lấy dữ liệu câu đúng
        }));
        arr.sort((a, b) => b.score - a.score);

        let html = "";
        arr.forEach((p, i) => {
            const currentRank = i + 1;
            const prevRank = oldRankings[p.student_name];
            let trend = "";
            
            if(prevRank) {
                if(currentRank < prevRank) trend = `<span class="trend-up">▲${prevRank - currentRank}</span>`;
                else if(currentRank > prevRank) trend = `<span class="trend-down">▼${currentRank - prevRank}</span>`;
            }
            oldRankings[p.student_name] = currentRank;

            if(i < 15 || isFinal) { 
                html += `<div class="rank-item">
                            <span><b>${currentRank}.</b> ${p.student_name} ${trend}</span>
                            <span style="font-weight:bold; color:var(--ka-blue)">${p.score}</span>
                         </div>`;
            }
        });
        
        document.getElementById('live-rank').innerHTML = html;
        if(isFinal) document.getElementById('final-leaderboard').innerHTML = html;
        window.fullDataForExport = arr;
    }

    function showFinalResult() {
        showScreen('final-result-screen');
        renderLeaderboard(true); 
    }

    // XUẤT EXCEL THEO ĐÚNG 5 CỘT YÊU CẦU
    function exportExcel() {
        if(!window.fullDataForExport || window.fullDataForExport.length === 0) return alert("Chưa có dữ liệu sinh viên!");
        
        const className = document.getElementById('class-name').value || 'Không rõ lớp';
        const now = new Date();
        const dateStr = now.toLocaleDateString('vi-VN') + ' ' + now.toLocaleTimeString('vi-VN'); // Lấy ngày giờ hiện tại

        // Tái cấu trúc dữ liệu theo 5 cột của TS. Hùng
        const excelData = window.fullDataForExport.map((p, index) => ({
            "STT": index + 1,
            "Ngày tháng năm": dateStr,
            "Họ tên": p.student_name,
            "Lớp": className,
            "Điểm số": p.score,
            "Số câu đúng": p.correct
        }));

        const ws = XLSX.utils.json_to_sheet(excelData);
        
        // Căn chỉnh độ rộng cột cho đẹp
        ws['!cols'] = [ {wch: 5}, {wch: 20}, {wch: 25}, {wch: 15}, {wch: 10}, {wch: 15} ];

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "DiemTongKet");
        XLSX.writeFile(wb, `KetQua_Egame_${className.replace(/\s+/g, '_')}.xlsx`);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
