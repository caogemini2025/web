<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Egame - Supabase Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1f618d; --accent: #d35400; --bg: #fdfefe; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .screen { display: none; }
        .active { display: block; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        button { padding: 15px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; background: white; }
        button:hover { border-color: var(--primary); background: #f4faff; }
        .leaderboard-list { text-align: left; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .rank-top { font-weight: bold; color: #c0392b; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-screen" class="screen active">
        <h1 style="color: var(--primary);">Egame - Supabase</h1>
        <div id="host-zone" style="background: #f8f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
            <p>🔑 <b>Dành cho Giảng viên:</b></p>
            <input type="file" id="upload-excel" accept=".xlsx">
        </div>
        <div id="player-zone">
            <p>📝 <b>Dành cho Sinh viên:</b></p>
            <input type="text" id="user-name" placeholder="Nhập tên của bạn..." style="padding:10px; width:70%;">
            <br><br>
            <button onclick="joinGame()" style="background: var(--primary); color: white; width: 150px;">VÀO PHÒNG</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>Phòng chờ trực tuyến</h2>
        <p>Đang chờ giảng viên bắt đầu...</p>
        <div id="online-list" style="color: #7f8c8d;">Sinh viên online: 0</div>
        <br>
        <button id="btn-start-host" style="display:none; background: #27ae60; color: white;">BẮT ĐẦU NGAY</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer" style="font-size: 1.5rem; color: var(--accent);">20s</div>
        <h2 id="question-text">Đang tải câu hỏi...</h2>
        <div class="opt-grid" id="option-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2>BẢNG VÀNG THÀNH TÍCH</h2>
        <div id="leaderboard-data" class="leaderboard-list"></div>
        <button onclick="location.reload()" style="margin-top:20px;">KẾT THÚC</button>
    </div>
</div>

<script>
    // Cấu hình Supabase
    const SB_URL = "YOUR_SUPABASE_URL";
    const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let myName = "";
    let myScore = 0;
    let isHost = false;
    let quizData = [];
    const channel = supabase.channel('egame_room', { config: { presence: { key: myName } } });

    // --- LOGIC GIẢNG VIÊN (HOST) ---
    document.getElementById('upload-excel').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, {type: 'binary'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            quizData = data.slice(1).map(r => ({ q: r[0], a: [r[1], r[2], r[3], r[4]], c: r[5] }));
            isHost = true;
            document.getElementById('btn-start-host').style.display = 'inline-block';
            alert("Đã nạp câu hỏi thành công!");
        };
        reader.readAsBinaryString(e.target.files[0]);
    };

    document.getElementById('btn-start-host').onclick = () => {
        sendNextQuestion(0);
    };

    function sendNextQuestion(index) {
        channel.send({
            type: 'broadcast',
            event: 'new_question',
            payload: { data: quizData[index], index: index, total: quizData.length }
        });
    }

    // --- LOGIC SINH VIÊN (PLAYER) ---
    async function joinGame() {
        myName = document.getElementById('user-name').value;
        if (!myName) return alert("Nhập tên bạn ơi!");
        
        showScreen('lobby-screen');

        // Đăng ký Realtime
        channel
        .on('presence', { event: 'sync' }, () => {
            const state = channel.presenceState();
            document.getElementById('online-list').innerText = `Sinh viên online: ${Object.keys(state).length}`;
        })
        .on('broadcast', { event: 'new_question' }, (payload) => {
            renderQuestion(payload.payload);
        })
        .on('broadcast', { event: 'finish_game' }, () => {
            showScreen('result-screen');
            loadLeaderboard();
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await channel.track({ name: myName, online_at: new Date().toISOString() });
            }
        });
    }

    function renderQuestion(payload) {
        showScreen('game-screen');
        const qData = payload.data;
        document.getElementById('question-text').innerText = `Câu ${payload.index + 1}: ${qData.q}`;
        const container = document.getElementById('option-container');
        container.innerHTML = '';
        
        qData.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = async () => {
                container.innerHTML = "<h3>Đã gửi đáp án. Chờ giảng viên...</h3>";
                if(i == qData.c) {
                    myScore += 10;
                    // Cập nhật điểm lên Supabase
                    await supabase.from('leaderboard').upsert({ student_name: myName, score: myScore }, { onConflict: 'student_name' });
                }
                
                if(isHost) {
                    setTimeout(() => {
                        if(payload.index + 1 < payload.total) sendNextQuestion(payload.index + 1);
                        else channel.send({ type: 'broadcast', event: 'finish_game' });
                    }, 3000); // Chờ 3 giây trước khi qua câu mới
                }
            };
            container.appendChild(btn);
        });
    }

    async function loadLeaderboard() {
        const { data } = await supabase.from('leaderboard').select('*').order('score', { ascending: false }).limit(10);
        const list = document.getElementById('leaderboard-data');
        list.innerHTML = data.map((p, i) => `
            <div class="row ${i < 3 ? 'rank-top' : ''}">
                <span>${i + 1}. ${p.student_name}</span>
                <span>${p.score} điểm</span>
            </div>
        `).join('');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
