<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Egame - TS. Cao Thanh Hùng</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1f618d; --accent: #d35400; --bg: #fdfefe; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 800px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .screen { display: none; }
        .active { display: block; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: 0.3s; background: #1f618d; color: white; font-weight: bold; }
        button:hover { background: #154360; transform: translateY(-2px); }
        .leaderboard-list { text-align: left; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        .row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; width: 80%; margin-bottom: 15px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-screen" class="screen active">
        <h1 style="color: var(--primary);">Egame - Hệ thống Tương tác</h1>
        <div style="background: #f8f9f9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #abc;">
            <p>🔑 <b>Dành cho Giảng viên:</b></p>
            <input type="file" id="upload-excel" accept=".xlsx" style="border:none; width: auto;">
        </div>
        <div>
            <p>📝 <b>Dành cho Sinh viên:</b></p>
            <input type="text" id="user-name" placeholder="Nhập họ tên của bạn...">
            <br>
            <button onclick="joinGame()">VÀO PHÒNG CHỜ</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>Phòng chờ trực tuyến</h2>
        <div id="online-list" style="font-size: 1.5rem; color: #2ecc71; margin-bottom: 20px; font-weight: bold;">Sinh viên online: 0</div>
        <p>Vui lòng đợi giảng viên bắt đầu tiết học...</p>
        <button id="btn-start-host" style="display:none; background: #27ae60;">BẮT ĐẦU PHIÊN HỌC</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer" style="font-size: 2.5rem; color: var(--accent); font-weight: bold;">20</div>
        <h2 id="question-text" style="margin: 20px 0;">Đang tải câu hỏi...</h2>
        <div class="opt-grid" id="option-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="color: var(--primary);">KẾT QUẢ PHIÊN HỌC</h2>
        <div id="leaderboard-data" class="leaderboard-list"></div>
        <button onclick="location.reload()" style="margin-top:20px; background: #7f8c8d;">THOÁT / LÀM MỚI</button>
    </div>
</div>

<script>
    // --- ĐÃ ĐIỀN THÔNG TIN CỦA ANH HÙNG ---
    const SB_URL = "https://iatarpzwbpmvxafkuhvh.supabase.co"; 
    const SB_KEY = "sb_publishable_L8zkZyosiIUfXbznifDV5g_Stvlxt_O"; 

    // Khởi tạo Supabase
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    let myName = "";
    let myScore = 0;
    let isHost = false;
    let quizData = [];
    let channel;

    // LOGIC GIẢNG VIÊN (Nạp Excel)
    document.getElementById('upload-excel').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (evt) => {
            const wb = XLSX.read(evt.target.result, {type: 'binary'});
            const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1});
            quizData = data.slice(1).map(r => ({ q: r[0], a: [r[1], r[2], r[3], r[4]], c: r[5] }));
            isHost = true;
            document.getElementById('btn-start-host').style.display = 'inline-block';
            alert("Kính thưa Tiến sĩ, đã nạp thành công " + quizData.length + " câu hỏi!");
        };
        reader.readAsBinaryString(e.target.files[0]);
    };

    document.getElementById('btn-start-host').onclick = () => {
        sendNextQuestion(0);
    };

    function sendNextQuestion(index) {
        channel.send({
            type: 'broadcast',
            event: 'new_question',
            payload: { data: quizData[index], index: index, total: quizData.length }
        });
    }

    // LOGIC SINH VIÊN (Vào phòng)
    async function joinGame() {
        myName = document.getElementById('user-name').value;
        if (!myName) return alert("Vui lòng nhập tên để giảng viên điểm danh!");
        
        showScreen('lobby-screen');

        channel = supabaseClient.channel('egame_room', { config: { presence: { key: myName } } });

        channel
        .on('presence', { event: 'sync' }, () => {
            const state = channel.presenceState();
            document.getElementById('online-list').innerText = `Sinh viên online: ${Object.keys(state).length}`;
        })
        .on('broadcast', { event: 'new_question' }, (payload) => {
            renderQuestion(payload.payload);
        })
        .on('broadcast', { event: 'finish_game' }, () => {
            showScreen('result-screen');
            loadLeaderboard();
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await channel.track({ name: myName, online_at: new Date().toISOString() });
            }
        });
    }

    function renderQuestion(payload) {
        showScreen('game-screen');
        const qData = payload.data;
        document.getElementById('question-text').innerText = `Câu ${payload.index + 1}: ${qData.q}`;
        const container = document.getElementById('option-container');
        container.innerHTML = '';
        
        qData.a.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.innerText = text;
            btn.onclick = async () => {
                container.innerHTML = "<h3 style='color:green;'>Đã ghi nhận đáp án! Vui lòng chờ...</h3>";
                if(i == qData.c) {
                    myScore += 10;
                    await supabaseClient.from('leaderboard').upsert({ student_name: myName, score: myScore }, { onConflict: 'student_name' });
                }
                
                if(isHost) {
                    setTimeout(() => {
                        if(payload.index + 1 < payload.total) sendNextQuestion(payload.index + 1);
                        else channel.send({ type: 'broadcast', event: 'finish_game' });
                    }, 4000); // 4 giây để sinh viên kịp nhìn đáp án
                }
            };
            container.appendChild(btn);
        });
    }

    async function loadLeaderboard() {
        const { data } = await supabaseClient.from('leaderboard').select('*').order('score', { ascending: false }).limit(10);
        const list = document.getElementById('leaderboard-data');
        list.innerHTML = data.map((p, i) => `
            <div class="row">
                <span><b>${i + 1}. ${p.student_name}</b></span>
                <span>${p.score} điểm</span>
            </div>
        `).join('');
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
